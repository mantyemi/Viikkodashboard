<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viikkoseuranta</title>
<style>
:root {
  --brand: #632e38; --brand-light: #f5eced; --brand-mid: #8a4a53;
  --ok: #2d7a4f; --ok-bg: #e8f5ee;
  --empty: #888780; --empty-bg: #f1efe8;
  --yellow: #f5c842; --yellow-light: #fffbe6; --yellow-dark: #7a5800;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f7f5f5; padding: 24px 16px; }
.container { max-width: 1300px; margin: 0 auto; }

.header { background: var(--brand); color: #fff; padding: 12px 20px; border-radius: 12px 12px 0 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 17px; font-weight: 500; }
.header-right { display: flex; align-items: center; gap: 8px; }
.sync-status { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.sync-status.ok { background: #e8f5ee; color: #2d7a4f; }
.sync-status.saving { background: #fff8ee; color: #a05c00; }
.sync-status.error { background: #fce8ea; color: #a02030; }
.sync-status.loading { background: #f1efe8; color: #888; }
.reset-btn-header { font-size: 11px; padding: 3px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); color: #fff; cursor: pointer; }
.reset-btn-header:hover { background: rgba(255,255,255,0.25); }

.week-nav { display: flex; align-items: center; background: var(--brand-light); border: 0.5px solid #d9b8bb; border-top: none; }
.week-nav button { background: none; border: none; cursor: pointer; padding: 10px 16px; font-size: 18px; color: var(--brand); }
.week-nav button:hover { background: #ecdde0; }
.week-nav button:disabled { color: #ccc; cursor: default; }
.week-nav button:disabled:hover { background: none; }
.week-info { flex: 1; text-align: center; font-size: 13px; font-weight: 500; color: var(--brand); padding: 10px 0; }
.week-info span { font-weight: 400; color: var(--brand-mid); font-size: 12px; margin-left: 6px; }

.week-tabs { display: flex; background: #ecdde0; border: 0.5px solid #d9b8bb; border-top: none; padding: 8px 12px; gap: 6px; flex-wrap: wrap; }
.week-tab { font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid #d9b8bb; background: #fff; color: var(--brand-mid); cursor: pointer; white-space: nowrap; }
.week-tab:hover { background: var(--brand-light); }
.week-tab.active { background: var(--brand); color: #fff; border-color: var(--brand); font-weight: 500; }
.week-tab.current::after { content: ' ●'; font-size: 8px; vertical-align: middle; }
.week-tab.future { border-style: dashed; color: #888; }
.week-tab.future.active { background: var(--brand-mid); border-style: solid; }

.summary-bar { background: #fff; border: 0.5px solid #d9b8bb; border-top: none; padding: 10px 18px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; min-height: 42px; }
.summary-bar .sb-label { font-size: 11px; color: var(--brand-mid); font-weight: 500; margin-right: 4px; }
.sb-chip { display: flex; align-items: center; gap: 5px; background: var(--brand-light); border: 0.5px solid #d9b8bb; border-radius: 20px; padding: 3px 10px; font-size: 11px; }
.sb-chip .sb-task { color: var(--brand); font-weight: 500; }
.sb-chip .sb-tgt { color: var(--brand-mid); }
.sb-chip .sb-done.ok { color: var(--ok); font-weight: 500; }
.sb-chip .sb-done.low { color: #a02030; font-weight: 500; }
.sb-chip .sb-done.neutral { color: var(--empty); }
.sb-empty { font-size: 11px; color: #bbb; font-style: italic; }

.controls { display: flex; gap: 8px; align-items: center; padding: 9px 16px; background: var(--brand-light); border: 0.5px solid #d9b8bb; border-top: none; flex-wrap: wrap; }
.controls label { font-size: 12px; color: var(--brand); font-weight: 500; }
.controls select, .controls input[type=text] { font-size: 12px; padding: 4px 8px; border: 0.5px solid #d9b8bb; border-radius: 6px; background: #fff; color: #111; height: 29px; }
.controls input[type=text] { width: 130px; }
.controls select { width: 170px; }
.controls button { font-size: 12px; padding: 4px 14px; border: 0.5px solid var(--brand); border-radius: 6px; background: var(--brand); color: #fff; cursor: pointer; height: 29px; }
.controls button.sec { background: transparent; color: var(--brand); }
.controls button:hover { opacity: 0.85; }
.readonly-note { font-size: 11px; color: #a05c00; background: #fff8ee; border: 0.5px solid #f0c080; border-radius: 6px; padding: 4px 12px; }

.wrap { border: 0.5px solid #d9b8bb; border-top: none; border-radius: 0 0 12px 12px; overflow-x: auto; background: #fff; }
table { width: 100%; border-collapse: collapse; table-layout: auto; min-width: 700px; }

.team-header td { background: var(--brand); color: #fff; font-size: 12px; font-weight: 500; padding: 7px 16px; letter-spacing: 0.04em; }
.team-header-dynamo td { background: var(--brand-mid); }
thead tr { background: var(--brand-light); }
th { font-size: 11px; font-weight: 500; color: var(--brand); padding: 8px 6px; text-align: center; border-bottom: 1px solid #d9b8bb; border-right: 0.5px solid #e8d0d3; white-space: nowrap; }
th:first-child { text-align: left; padding-left: 16px; min-width: 110px; }
th.today { background: var(--brand); color: #fff; }
th.kaupat-sum-th { background: var(--yellow); color: var(--yellow-dark); font-weight: 700; min-width: 70px; }

td { padding: 5px 4px; border-bottom: 0.5px solid #eee; border-right: 0.5px solid #eee; vertical-align: top; }
td:first-child { padding-left: 14px; vertical-align: middle; }
td.kaupat-sum-td { background: var(--yellow-light); border-left: 2px solid var(--yellow); text-align: center; vertical-align: middle; }

.member-name { display: flex; align-items: center; gap: 7px; }
.avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--brand); color: #fff; font-size: 10px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.avatar.dyn { background: var(--brand-mid); }
.member-label { font-size: 13px; color: #111; cursor: pointer; border-bottom: 1px dashed transparent; }
.member-label:hover { border-bottom-color: var(--brand); }
.member-edit { font-size: 13px; border: 0.5px solid var(--brand); border-radius: 4px; padding: 2px 6px; width: 88px; color: #111; }
.remove-btn { margin-left: auto; cursor: pointer; color: #ccc; font-size: 18px; background: none; border: none; padding: 0 2px; }
.remove-btn:hover { color: var(--brand); }

.day-cell { display: flex; flex-direction: column; gap: 5px; padding: 3px 2px; }
.day-cell.vapaa-cell { background: #f1efe8; }
.task-block { background: #fafafa; border: 0.5px solid #e8e8e8; border-radius: 5px; padding: 4px 5px; display: flex; flex-direction: column; gap: 2px; }
.task-block.vapaa-block { background: #f1efe8; border-color: #ddd9d3; }
.task-input { font-size: 11px; border: 0.5px solid #ddd; border-radius: 4px; padding: 2px 5px; width: 100%; background: #fff; color: #111; }
.task-input:focus { outline: none; border-color: var(--brand); }
.task-input:disabled { background: #f1efe8; color: #aaa; border-color: #e0ddd7; }
.kpl-row { display: flex; gap: 3px; align-items: center; }
.kpl-input { font-size: 12px; font-weight: 500; border: 0.5px solid #ddd; border-radius: 4px; padding: 2px 4px; width: 52px; text-align: center; background: #fff; color: #111; }
.kpl-input:focus { outline: none; border-color: var(--brand); }
.kpl-input:disabled { background: #f1efe8; color: #aaa; }
.kpl-sep { font-size: 11px; color: var(--empty); }
.target-input { font-size: 11px; border: none; border-radius: 4px; padding: 2px 3px; width: 42px; text-align: center; color: var(--empty); background: transparent; }
.target-input:focus { outline: none; border-bottom: 0.5px solid #ccc; }
.target-input:disabled { color: #ccc; }
.badge { font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: 500; display: inline-block; }
.badge.ok { background: var(--ok-bg); color: var(--ok); }
.badge.low { background: #fce8ea; color: #a02030; }
.badge.empty { background: var(--empty-bg); color: var(--empty); }
.vapaa-label { font-size: 11px; font-weight: 500; color: #888; background: #e4e2db; border-radius: 4px; padding: 2px 8px; text-align: center; }
.badge-holder { min-height: 18px; }
.task-block-actions { display: flex; gap: 3px; align-items: center; margin-top: 1px; }
.tb-btn { font-size: 10px; padding: 1px 6px; border-radius: 4px; border: 0.5px solid #ddd; background: transparent; color: #888; cursor: pointer; }
.tb-btn:hover { background: var(--brand-light); color: var(--brand); border-color: #d9b8bb; }
.tb-btn.del { color: #c08; border-color: #e8c0d0; }
.tb-btn.del:hover { background: #fce8ea; color: #a02030; }
.tb-btn.vapaa-on { background: #e4e2db; color: #666; border-color: #bbb; }
.add-task-btn { font-size: 10px; padding: 2px 8px; border-radius: 4px; border: 0.5px dashed #d9b8bb; background: transparent; color: var(--brand-mid); cursor: pointer; width: 100%; text-align: center; margin-top: 1px; }
.add-task-btn:hover { background: var(--brand-light); }

/* Kaupat per day input */
.kaupat-day-wrap { margin-top: 4px; border-top: 0.5px dashed #e8d870; padding-top: 3px; }
.kaupat-day-label { font-size: 9px; color: #a08020; margin-bottom: 1px; }
.kaupat-input { font-size: 13px; font-weight: 600; border: 0.5px solid #e8d870; border-radius: 4px; padding: 3px 4px; width: 100%; text-align: center; background: #fffdf0; color: var(--yellow-dark); }
.kaupat-input:focus { outline: none; border-color: var(--yellow); }
.kaupat-sum-val { font-size: 16px; font-weight: 700; color: var(--yellow-dark); }

/* Team comment row */
.team-comment-row td { background: #fdfcf7; border-top: 0.5px solid #ede8d8; }
.team-comment-label { font-size: 11px; color: #a08020; font-weight: 500; padding: 6px 14px; vertical-align: top; white-space: nowrap; }
.team-comment-cell { padding: 5px 8px; }
.comment-input { font-size: 12px; border: 0.5px solid #e0d8b0; border-radius: 4px; padding: 5px 8px; width: 100%; min-height: 48px; resize: vertical; background: #fdfcf7; color: #444; }
.comment-input:focus { outline: none; border-color: #c8b870; }
.comment-ro { font-size: 12px; color: #555; padding: 4px 6px; white-space: pre-wrap; line-height: 1.5; }

.legend { display: flex; gap: 12px; padding: 8px 20px; font-size: 11px; color: #888; flex-wrap: wrap; margin-top: 2px; }
.legend span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.ro-task { font-size: 11px; padding: 3px 5px; border-radius: 4px; background: #fafafa; border: 0.5px solid #eee; display: flex; justify-content: space-between; align-items: center; gap: 4px; }
.ro-task.vapaa { background: #f1efe8; color: #aaa; }
.ro-task-name { color: #444; font-size: 11px; flex: 1; }

.loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(247,245,245,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100; }
.loading-spinner { width: 36px; height: 36px; border: 3px solid #d9b8bb; border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--brand-mid); }
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Ladataan tietoja...</div>
</div>
<div class="container">
  <div class="header">
    <h1>&#128197; Viikkoseuranta</h1>
    <div class="header-right">
      <button class="reset-btn-header" onclick="resetWeek()">&#8635; Tyhjennä viikko</button>
      <span id="syncStatus" class="sync-status loading">&#9679; Yhdistetään...</span>
    </div>
  </div>
  <div class="week-nav">
    <button id="btnPrev" onclick="changeWeek(-1)">&#8592;</button>
    <div class="week-info" id="weekInfo"></div>
    <button id="btnNext" onclick="changeWeek(1)">&#8594;</button>
  </div>
  <div class="week-tabs" id="weekTabs"></div>
  <div class="summary-bar" id="summaryBar"><span class="sb-empty">Ladataan...</span></div>
  <div class="controls" id="controlsBar">
    <label>Tiimi:</label>
    <select id="teamSelect">
      <option value="kohde">Kohdeassistentit</option>
      <option value="dynamo">Dynamo</option>
    </select>
    <label>Nimi:</label>
    <input type="text" id="newMember" placeholder="Lisää jäsen..." onkeydown="if(event.key==='Enter')addMember()" />
    <button onclick="addMember()">+ Lisää</button>
    <span id="readonlyNote" class="readonly-note" style="display:none">&#128274; Vanha viikko — vain luku</span>
  </div>
  <div class="wrap">
    <table id="mainTable">
      <thead><tr id="headerRow"><th>Tiimin jäsen</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="legend">
    <span><span class="dot" style="background:#e8f5ee;border:1.5px solid #2d7a4f"></span> Tavoite saavutettu</span>
    <span><span class="dot" style="background:#fce8ea;border:1.5px solid #a02030"></span> Alle tavoitteen</span>
    <span><span class="dot" style="background:#f1efe8;border:1.5px solid #aaa"></span> Vapaa</span>
    <span><span class="dot" style="background:var(--yellow-light);border:1.5px solid var(--yellow)"></span> Kaupat yhteensä</span>
    <span style="margin-left:auto;color:#bbb">Nimeä muokkaat klikkaamalla sitä</span>
  </div>
</div>
<script>
const SUPABASE_URL='https://uehdhlilxgpekxrrexdd.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlaGRobGlseGdwZWt4cnJleGRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzE0ODEsImV4cCI6MjA5MzcwNzQ4MX0.X8ee4oQO2Dl0uurXgUm6CEbKPTbnOuPFFOdC1ScZqgs';
const RECORD_ID='main';
const RESET_PASSWORD='Winter_2012';

// ---- Supabase cell-level API ----
const SB_HEADERS={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};

// Tallenna yksi solu: id = "viikkoavain__solunnimi"
async function sbSaveCell(weekKey, cellId, value){
  const id=weekKey+'__'+cellId;
  const res=await fetch(SUPABASE_URL+'/rest/v1/dashboard_cells',{
    method:'POST',
    headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({id,value,updated_at:new Date().toISOString()})
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
}

// Tallenna tiimin kokoonpano erikseen (ei viikkokohtainen)
async function sbSaveTeams(teams){
  const res=await fetch(SUPABASE_URL+'/rest/v1/dashboard_cells',{
    method:'POST',
    headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({id:'__teams__',value:teams,updated_at:new Date().toISOString()})
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
}

// Lataa kaikki solut
async function sbLoadAll(){
  const res=await fetch(SUPABASE_URL+'/rest/v1/dashboard_cells?select=id,value,updated_at',{headers:SB_HEADERS});
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}

// Rakenna state riveistä
function buildStateFromRows(rows){
  const s={teams:{kohde:[],dynamo:[]},weeks:{}};
  rows.forEach(row=>{
    if(row.id==='__teams__'){s.teams=row.value;return;}
    // id muoto: "2025-W21__solunnimi"
    const sep=row.id.indexOf('__');
    if(sep===-1)return;
    const weekKey=row.id.substring(0,sep);
    const cellId=row.id.substring(sep+2);
    if(!s.weeks[weekKey])s.weeks[weekKey]={cells:{},updated_at:{}};
    s.weeks[weekKey].cells[cellId]=row.value;
    s.weeks[weekKey].updated_at[cellId]=row.updated_at;
  });
  return s;
}

// Hae viimeisin updated_at per viikko
async function sbGetLatestUpdates(){
  const res=await fetch(SUPABASE_URL+'/rest/v1/dashboard_cells?select=id,updated_at',{headers:SB_HEADERS});
  if(!res.ok)return null;
  return res.json();
}

// Vanha yhteensopivuus: lataa vanha dashboard_data ja migroi dashboard_cells:iin
async function migrateOldData(){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/dashboard_data?id=eq.main&select=data',{headers:SB_HEADERS});
    if(!res.ok)return false;
    const rows=await res.json();
    if(!rows||!rows.length||!rows[0].data)return false;
    const old=rows[0].data;
    if(!old.weeks||!Object.keys(old.weeks).length)return false;
    console.log('Migroidaan vanha data...');
    if(old.teams) await sbSaveTeams(old.teams);
    for(const [weekKey,weekData] of Object.entries(old.weeks)){
      if(!weekData.cells)continue;
      for(const [cellId,value] of Object.entries(weekData.cells)){
        await sbSaveCell(weekKey,cellId,value);
      }
    }
    console.log('Migraatio valmis.');
    return true;
  }catch(e){console.log('Migraatio epäonnistui:',e);return false;}
}

const DAYS=['Ma','Ti','Ke','To','Pe','La','Su'];
function getMondayOf(date){const d=new Date(date);d.setHours(0,0,0,0);const day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d;}
function getWeekDates(monday){return Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(d.getDate()+i);return d;});}
function getWeekNum(d){const date=new Date(d);date.setHours(0,0,0,0);date.setDate(date.getDate()+3-(date.getDay()+6)%7);const w1=new Date(date.getFullYear(),0,4);return 1+Math.round(((date-w1)/86400000-3+(w1.getDay()+6)%7)/7);}
function fmt(d){return d.getDate()+'.'+(d.getMonth()+1)+'.';}
function mondayKey(monday){return monday.getFullYear()+'-W'+String(getWeekNum(monday)).padStart(2,'0');}
function getMondayFromYearWeek(year,week){const jan4=new Date(year,0,4);const d=new Date(getMondayOf(jan4));d.setDate(d.getDate()+(week-1)*7);return d;}

let state={teams:{kohde:['Aino K.','Emilia S.','Jasmin Ha','Jasmin Hu','Linda L.','Riina S.'],dynamo:['Henna D.','Julia H.','Julius H.','Kari R.','Laura A.','Maija A.','Sanni A.']},weeks:{}};
const todayMonday=getMondayOf(new Date());
let currentMonday=getMondayOf(new Date());
const isCurrentWeek=()=>currentMonday.getTime()===todayMonday.getTime();
const isPastWeek=()=>currentMonday.getTime()<todayMonday.getTime();
const isFutureWeek=()=>currentMonday.getTime()>todayMonday.getTime();

// Solukohtainen tallennus — tallentaa vain muuttuneet solut
const pendingCells={}; // weekKey__cellId -> value
let saveTimer=null;

function queueCell(weekKey,cellId,value){
  pendingCells[weekKey+'__'+cellId]=value;
  scheduleSave();
}
function queueTeams(){
  pendingCells['__teams__']=state.teams;
  scheduleSave();
}

function scheduleSave(){
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    const toSave=Object.entries(pendingCells);
    if(!toSave.length){setSyncStatus('ok');return;}
    // Tyhjennä pending ennen tallennusta
    Object.keys(pendingCells).forEach(k=>delete pendingCells[k]);
    try{
      await Promise.all(toSave.map(([id,value])=>{
        if(id==='__teams__') return sbSaveTeams(value);
        const sep=id.indexOf('__');
        const weekKey=id.substring(0,sep);
        const cellId=id.substring(sep+2);
        return sbSaveCell(weekKey,cellId,value);
      }));
      setSyncStatus('ok');
    }catch(e){
      setSyncStatus('error');
      // Palauta pending jos tallennus epäonnistui
      toSave.forEach(([id,value])=>pendingCells[id]=value);
    }
  },600);
}
function setSyncStatus(s){const el=document.getElementById('syncStatus');if(!el)return;const m={ok:{cls:'ok',text:'&#10003; Tallennettu'},saving:{cls:'saving',text:'&#8635; Tallennetaan...'},error:{cls:'error',text:'&#9888; Tallennusvirhe'},loading:{cls:'loading',text:'&#9679; Yhdistetään...'},live:{cls:'ok',text:'&#9679; Reaaliaikainen'}};const x=m[s]||m.ok;el.className='sync-status '+x.cls;el.innerHTML=x.text;}

function getWeekData(monday){const key=mondayKey(monday);if(!state.weeks[key])state.weeks[key]={cells:{}};return state.weeks[key];}
function cellKey(t,m,d){return t+'__'+m+'__'+d;}
function getCellTasks(weekData,team,member,day){const key=cellKey(team,member,day);if(!weekData.cells[key]||!Array.isArray(weekData.cells[key]))weekData.cells[key]=[{task:'',kpl:'',target:'',vapaa:false}];return weekData.cells[key];}
function getTeamComment(weekData,team,dayIdx){return weekData.cells['teamcomment__'+team+'__'+dayIdx]||'';}
function setTeamComment(weekData,team,dayIdx,val){weekData.cells['teamcomment__'+team+'__'+dayIdx]=val;}
function getKaupat(weekData,member,dayIdx){const key='kaupat__'+member+'__'+dayIdx;return weekData.cells[key]!==undefined?weekData.cells[key]:'';}
function setKaupat(weekData,member,dayIdx,val){weekData.cells['kaupat__'+member+'__'+dayIdx]=val;}
function kaupatSum(weekData,member){let s=0;for(let i=0;i<7;i++){const v=getKaupat(weekData,member,i);if(v!=='')s+=parseInt(v)||0;}return s;}
function initials(n){const p=n.trim().split(' ');return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase();}

function initHeader(dates){
  const hr=document.getElementById('headerRow');
  while(hr.children.length>1)hr.removeChild(hr.lastChild);
  const today=new Date();today.setHours(0,0,0,0);

  const tgVal=task.target!==''&&task.target!==undefined?task.target:'';

function updateTask(team,member,dayIdx,taskIdx,field,value){
  if(isPastWeek())return;
  const wd=getWeekData(currentMonday);
  const tasks=getCellTasks(wd,team,member,dayIdx);
  if(!tasks[taskIdx])return;
  tasks[taskIdx][field]=value;
  queueCell(mondayKey(currentMonday),cellKey(team,member,dayIdx),tasks);
  refreshBadge(team,member,dayIdx,taskIdx,tasks[taskIdx]);
  renderSummary();
}
function addTask(team,member,dayIdx){
  if(isPastWeek())return;
  const wd=getWeekData(currentMonday);
  const tasks=getCellTasks(wd,team,member,dayIdx);
  tasks.push({task:'',kpl:'',target:'',vapaa:false});
  queueCell(mondayKey(currentMonday),cellKey(team,member,dayIdx),tasks);

function deleteTask(team,member,dayIdx,taskIdx){
  if(isPastWeek())return;

function renderSummary(){
  const bar=document.getElementById('summaryBar');if(!bar)return;
  const wd=getWeekData(currentMonday);
  const map={};
  Object.entries(wd.cells||{}).forEach(([k,v])=>{
    if(k.startsWith('teamcomment__')||k.startsWith('kaupat__'))return;
    if(!Array.isArray(v))return;
    v.forEach(t=>{
      if(t.vapaa)return;
      const name=(t.task||'').trim();if(!name)return;
      const key=name.toLowerCase();
      if(!map[key])map[key]={label:name,target:0,done:0,hasTarget:false,hasDone:false};
      const tg=t.target!==''&&t.target!==undefined?parseInt(t.target):null;
      const kpl=t.kpl!==''&&t.kpl!==undefined?parseInt(t.kpl):null;
      if(tg!==null&&!isNaN(tg)){map[key].target+=tg;map[key].hasTarget=true;}
      if(kpl!==null&&!isNaN(kpl)){map[key].done+=kpl;map[key].hasDone=true;}
    });
  });
  const keys=Object.keys(map);
  bar.innerHTML='';
  if(!keys.length){bar.innerHTML='<span class="sb-empty">Ei tehtäviä syötettynä.</span>';return;}
  const lbl=document.createElement('span');lbl.className='sb-label';lbl.textContent='Viikon koonnit:';bar.appendChild(lbl);
  keys.sort().forEach(key=>{
    const d=map[key];const chip=document.createElement('div');chip.className='sb-chip';
    let dc='neutral';if(d.hasDone&&d.hasTarget)dc=d.done>=d.target?'ok':'low';
    let html='<span class="sb-task">'+d.label+'</span>';
    if(d.hasTarget)html+='<span class="sb-tgt">tavoite '+d.target+' kpl</span>';
    if(d.hasDone)html+='<span class="sb-done '+dc+'">toteutunut '+d.done+' kpl</span>';
    chip.innerHTML=html;bar.appendChild(chip);
  });
}

function renderTabs(){
  const tabs=document.getElementById('weekTabs');tabs.innerHTML='';
  const weeks=[];const curKey=mondayKey(todayMonday);
  Object.keys(state.weeks).forEach(key=>{const hasData=state.weeks[key]&&state.weeks[key].cells&&Object.keys(state.weeks[key].cells).length>0;if(hasData||key===curKey)weeks.push(key);});
  if(!weeks.includes(curKey))weeks.push(curKey);
  // Lisää aina seuraava viikko tab
  const nextMonday=new Date(todayMonday);nextMonday.setDate(nextMonday.getDate()+7);
  const nextKey=mondayKey(nextMonday);if(!weeks.includes(nextKey))weeks.push(nextKey);
  weeks.sort().reverse().forEach(key=>{
    const[year,wStr]=key.split('-W');const wNum=parseInt(wStr);
    const monday=getMondayFromYearWeek(parseInt(year),wNum);const dates=getWeekDates(monday);
    const isActive=mondayKey(currentMonday)===key;const isCur=key===curKey;
    const tab=document.createElement('div');
    const isFut=monday.getTime()>todayMonday.getTime();
    tab.className='week-tab'+(isActive?' active':'')+(isCur?' current':'')+(isFut?' future':'');
    tab.textContent='Vk '+wNum+' ('+fmt(dates[0])+'–'+fmt(dates[6])+')';
    tab.onclick=()=>jumpToWeek(monday.getTime());tabs.appendChild(tab);
  });
}

function startEdit(team,oldName,el){
  const inp=document.createElement('input');inp.type='text';inp.className='member-edit';inp.value=oldName;
  el.replaceWith(inp);inp.focus();inp.select();
  function commit(){
    const newName=inp.value.trim();
    if(newName&&newName!==oldName&&!state.teams[team].includes(newName)){
      const idx=state.teams[team].indexOf(oldName);if(idx>-1)state.teams[team][idx]=newName;
      const newWeeks={};
      Object.keys(state.weeks).forEach(wk=>{
        const wd=state.weeks[wk];const nc={};
        Object.keys(wd.cells||{}).forEach(k=>{
          if(k.startsWith(team+'__'+oldName+'__'))nc[team+'__'+newName+'__'+k.split('__')[2]]=wd.cells[k];
          else if(k==='kaupat__'+oldName+'__'+'0'||k.startsWith('kaupat__'+oldName+'__'))nc['kaupat__'+newName+'__'+k.split('__')[2]]=wd.cells[k];
          else nc[k]=wd.cells[k];
        });
        newWeeks[wk]={cells:nc};
      });
      state.weeks=newWeeks;queueTeams();render();
    } else {
      const span=document.createElement('span');span.className='member-label';span.textContent=oldName;
      span.title='Klikkaa muokataksesi';span.onclick=function(){startEdit(team,oldName,this);};inp.replaceWith(span);
    }
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=oldName;inp.blur();}});
}

const wk=mondayKey(currentMonday);

// Solukohtainen polling — hakee vain muuttuneet solut
let lastPollTime=null;

async function pollUpdates(){
  if(saveTimer)return; // Oma tallennus käynnissä
  try{
    const timeFilter=lastPollTime?'&updated_at=gt.'+encodeURIComponent(lastPollTime):'';
    const res=await fetch(SUPABASE_URL+'/rest/v1/dashboard_cells?select=id,value,updated_at&order=updated_at.desc'+timeFilter,{headers:SB_HEADERS});
    if(!res.ok)return;
    const rows=await res.json();
    if(!rows||!rows.length)return;
    lastPollTime=rows[0].updated_at;
    let changed=false;
    rows.forEach(row=>{
      if(row.id==='__teams__'){
        // Älä ylikirjoita tiimejä jos on omia muutoksia jonossa
        if(!pendingCells['__teams__']){state.teams=row.value;changed=true;}
        return;
      }
      const sep=row.id.indexOf('__');
      if(sep===-1)return;
      const weekKey=row.id.substring(0,sep);
      const cellId=row.id.substring(sep+2);
      // Älä ylikirjoita jos on pending muutos
      const pendKey=weekKey+'__'+cellId;
      if(pendingCells[pendKey])return;
      if(!state.weeks[weekKey])state.weeks[weekKey]={cells:{}};
      state.weeks[weekKey].cells[cellId]=row.value;
      changed=true;
    });
    if(changed){render();setSyncStatus('live');}
  }catch(e){}
}

const DEFAULT_TEAMS={kohde:['Aino K.','Emilia S.','Jasmin Ha','Jasmin Hu','Linda L.','Riina S.'],dynamo:['Henna D.','Julia H.','Julius H.','Kari R.','Laura A.','Maija A.','Sanni A.']};
function cleanOldWeeks(s){
  if(!s.weeks)return s;
  const keep=['2025-W21','2025-W22','2025-W23','2025-W24','2025-W25','2025-W26','2025-W27','2025-W28','2025-W29','2025-W30'];
  Object.keys(s.weeks).forEach(k=>{
    const wn=parseInt((k.split('-W')[1]||'0'));
    const yr=parseInt((k.split('-W')[0])||'0');
    if(yr===2025&&wn<=20)delete s.weeks[k];
  });
  return s;
}
function ensureTeams(s){
  if(!s.teams) s.teams=Object.assign({},DEFAULT_TEAMS);
  if(!s.teams.kohde||s.teams.kohde.length===0) s.teams.kohde=DEFAULT_TEAMS.kohde.slice();
  if(!s.teams.dynamo||s.teams.dynamo.length===0) s.teams.dynamo=DEFAULT_TEAMS.dynamo.slice();
  if(!s.weeks) s.weeks={};
  return s;
}
async function init(){
  try{
    const rows=await sbLoadAll();
    if(rows&&rows.length>0){
      const built=buildStateFromRows(rows);
      state=cleanOldWeeks(ensureTeams(built));
      // Aseta lastPollTime viimeisimmän muutoksen mukaan
      const times=rows.map(r=>r.updated_at).filter(Boolean).sort();
      if(times.length) lastPollTime=times[times.length-1];
    } else {
      // Tarkista onko vanhaa dataa dashboard_data-taulussa
      const migrated=await migrateOldData();
      if(!migrated){
        // Ei dataa lainkaan — tallenna oletustiimit
        await sbSaveTeams(state.teams);
      } else {
        // Lataa uudelleen migraation jälkeen
        const rows2=await sbLoadAll();
        if(rows2&&rows2.length>0){
          state=cleanOldWeeks(ensureTeams(buildStateFromRows(rows2)));
        }
      }
    }
    setSyncStatus('live');
  }catch(e){console.error(e);setSyncStatus('error');}
  document.getElementById('loadingOverlay').style.display='none';
  render();
  setInterval(pollUpdates,8000);
}
init();
</script>
